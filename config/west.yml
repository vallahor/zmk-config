manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware

    - name: yourgithub
      url-base: https://github.com/yourgithub

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    - name: zmk-repeat-hold-module
      remote: yourgithub
      revision: main
      path: modules/zmk-repeat-hold-module

  self:
    path: config
